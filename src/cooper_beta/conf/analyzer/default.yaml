fit:
  min_points_per_slice: 7
  max_rmse: 6.0
  min_axis: 3.0
  max_axis: 199.0
  max_flattening: 3.5
  least_squares:
    # OpenCV's fitEllipseDirect() is now the default fitter.
    # Keep these legacy keys for backward-compatible config parsing; only
    # `f_scale` still affects the residual-derived inlier band.
    method: trf
    loss: soft_l1
    f_scale: 1.0
decision:
  barrel_valid_ratio: 0.625001
  use_adjusted_score: true
  min_intersections_for_scoring: 7
  min_scored_layer_frac: 0.04
  min_scored_layers: 7
  small_barrel_rescue:
    enabled: true
    min_score: 0.999
    min_scored_layers: 5
    min_total_layers: 25
    max_avg_radius: 10.5
    compact_enabled: true
    compact_min_score: 0.999
    compact_min_scored_layers: 4
    compact_min_total_layers: 18
    compact_max_total_layers: 24
    compact_min_chain_residues: 120
    compact_min_sheet_residues: 60
    compact_max_avg_radius: 12.5
    sparse_enabled: true
    sparse_min_score: 0.999
    sparse_min_scored_layers: 3
    sparse_min_total_layers: 30
    sparse_min_chain_residues: 160
    sparse_max_chain_residues: 190
    sparse_min_sheet_residues: 70
    sparse_max_avg_radius: 9.0
  near_miss_rescue:
    enabled: true
    soft_nn_enabled: true
    soft_nn_min_layers: 3
    soft_nn_min_inlier_frac: 0.70
    soft_nn_max_robust_cv: 0.20
    soft_nn_min_total_layers: 30
    soft_nn_max_total_layers: 40
    soft_nn_min_chain_residues: 220
    soft_nn_max_chain_residues: 260
    soft_nn_min_sheet_residues: 60
    soft_nn_max_sheet_residues: 80
    compact_partner_enabled: true
    compact_partner_min_score: 0.50
    compact_partner_min_valid_layers: 1
    compact_partner_min_scored_layers: 2
    compact_partner_min_total_layers: 16
    compact_partner_max_total_layers: 22
    compact_partner_min_chain_residues: 180
    compact_partner_max_chain_residues: 220
    compact_partner_min_sheet_residues: 65
    compact_partner_max_sheet_residues: 85
    compact_partner_min_avg_radius: 8.0
    compact_partner_max_avg_radius: 13.0
    large_partner_enabled: true
    large_partner_min_score: 0.55
    large_partner_min_valid_layers: 16
    large_partner_min_scored_layers: 25
    large_partner_min_total_layers: 50
    large_partner_min_chain_residues: 500
    large_partner_min_sheet_residues: 200
    large_partner_min_avg_radius: 15.0
    large_partner_max_avg_radius: 25.0
axis_search:
  enabled: true
  refine:
    enabled: true
    angle_deg: 5.0
rules:
  nearest_neighbor:
    enabled: true
    max_robust_cv: 0.4
    min_inlier_frac: 0.75
    fail_as_junk: true
  angle:
    enabled: true
    max_gap_deg: 160.0
    fail_as_junk: false
    order:
      enabled: true
      local_step_max: 1
      min_local_frac: 0.90
      max_mean_circ_dist_norm: 0.10
  sequence_core:
    enabled: true
